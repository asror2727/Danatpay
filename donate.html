<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donat qilish</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --primary: #8b5cf6;
    --primary-dark: #7c3aed;
    --accent: #38bdf8;
    --success: #22c55e;
    --danger: #ef4444;
    --bg: #0f0c1d;
    --card: #1a1630;
    --card-2: #211c3d;
    --border: #322b52;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: #f1eefc;
    margin: 0;
    padding: 0 16px 100px;
    min-height: 100vh;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .bottom-nav {
    position: fixed; left: 12px; right: 12px; bottom: 12px;
    background: #171330;
    border: 1px solid var(--border);
    border-radius: 22px;
    display: flex;
    padding: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 500;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 8px 2px; border-radius: 16px; cursor: pointer;
    color: #8b85ad; font-size: 10px; font-weight: 700; background: transparent;
  }
  .nav-btn .nav-icon { font-size: 18px; }
  .nav-btn.active { background: var(--primary); color: #fff; }

  .section-title { font-size: 16px; font-weight: 800; margin: 8px 0 14px; }
  .lb-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px; margin-bottom: 8px;
  }
  .lb-rank { font-weight: 800; width: 26px; text-align: center; opacity: 0.6; }
  .lb-rank.gold { color: #fbbf24; opacity: 1; }
  .lb-avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--card-2);
    display: flex; align-items: center; justify-content: center; font-weight: 700; overflow: hidden; flex-shrink: 0;
  }
  .lb-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .lb-title { flex: 1; font-weight: 600; font-size: 14px; }
  .lb-total { font-weight: 800; font-size: 13px; color: var(--success); }

  .stat-row {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; margin-bottom: 8px; font-size: 14px;
  }
  .stat-row .val { font-weight: 800; }
  .empty-tab { text-align: center; opacity: 0.5; margin-top: 40px; font-size: 14px; }

  .theme-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px;
  }
  .theme-preview {
    width: 52px; height: 52px; border-radius: 12px; flex-shrink: 0;
  }
  .theme-info { flex: 1; }
  .theme-name { font-weight: 700; font-size: 14px; }
  .theme-price { font-size: 12px; opacity: 0.6; }
  .theme-btn {
    padding: 8px 14px; border-radius: 10px; border: none;
    font-size: 12px; font-weight: 700; cursor: pointer;
  }
  .theme-btn.buy { background: var(--primary); color: #fff; }
  .theme-btn.active { background: var(--success); color: #fff; }

  .hero {
    margin: 0 -16px 20px;
    padding: 28px 16px 40px;
    background: radial-gradient(circle at 30% 20%, #4c1d95, #0f0c1d 70%),
                linear-gradient(135deg, #3b0764, #1e1b4b 50%, #0f0c1d);
    border-radius: 0 0 28px 28px;
    text-align: center;
    position: relative;
  }
  .hero .icon {
    width: 68px; height: 68px; border-radius: 50%;
    background: rgba(139,92,246,0.25);
    border: 3px solid var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800; overflow: hidden;
    margin: 0 auto 12px;
  }
  .hero .icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .hero .title { font-size: 18px; font-weight: 800; margin-bottom: 2px; }
  .hero .sub { font-size: 13px; opacity: 0.7; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px;
    margin-top: -24px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    position: relative;
    z-index: 2;
  }

  .quick-amounts {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .quick-amounts button {
    padding: 10px 4px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--card-2);
    color: #f1eefc;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }
  .quick-amounts button.active {
    border-color: var(--primary);
    background: var(--primary);
    color: #fff;
  }

  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  input[type=text], textarea, input[type=number] {
    width: 100%;
    padding: 13px 14px;
    border-radius: 14px;
    border: 2px solid var(--border);
    font-size: 15px;
    background: var(--card-2);
    color: #f1eefc;
    font-family: inherit;
  }
  input::placeholder, textarea::placeholder { color: #8b85ad; }
  input:focus, textarea:focus { outline: none; border-color: var(--primary); }
  textarea { resize: none; min-height: 80px; }
  .counter { text-align: right; font-size: 11px; opacity: 0.5; margin: -6px 0 10px; }

  .toggle {
    width: 42px; height: 24px; border-radius: 20px;
    background: var(--border); position: relative; cursor: pointer; flex-shrink: 0;
    transition: background 0.2s;
  }
  .toggle.on { background: var(--primary); }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 20px; height: 20px; border-radius: 50%; background: #fff;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(18px); }
  .toggle-label { font-size: 12px; opacity: 0.6; }

  .methods { display: flex; gap: 8px; margin: 12px 0; }
  .method-btn {
    flex: 1; padding: 11px; border-radius: 12px; border: 2px solid var(--border);
    background: var(--card-2); color: #f1eefc; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .method-btn.active {
    border-color: var(--accent);
    background: var(--accent);
    color: #06222f;
  }

  .terms { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; margin: 12px 0; opacity: 0.7; }
  .terms a { color: var(--accent); font-weight: 600; }

  #payBtn {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #fff; font-size: 16px; font-weight: 800; cursor: pointer;
    box-shadow: 0 6px 18px rgba(139,92,246,0.4);
    transition: transform 0.1s;
  }
  #payBtn:active { transform: scale(0.98); }
  #payBtn:disabled { opacity: 0.4; box-shadow: none; }

  #msg { text-align: center; color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 18px; }

  /* Status overlay (checking / success / failure) */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center; z-index: 999;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 30px 24px;
    text-align: center;
    max-width: 320px;
    width: 85%;
    animation: pop 0.25s ease;
  }
  @keyframes pop {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal .emoji { font-size: 48px; margin-bottom: 10px; }
  .modal h2 { font-size: 19px; margin: 0 0 8px; }
  .modal p { font-size: 14px; opacity: 0.7; margin: 0 0 20px; line-height: 1.5; }
  .modal button {
    width: 100%; padding: 14px; border: none; border-radius: 14px;
    color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .modal .btn-success { background: var(--success); }
  .modal .btn-danger { background: var(--danger); }

  .spinner {
    width: 48px; height: 48px; border-radius: 50%;
    border: 4px solid var(--border); border-top-color: var(--primary);
    margin: 0 auto 16px; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="tabAsosiy" class="tab-content active">
  <div class="hero">
    <div class="icon" id="channelIcon">D</div>
    <div class="title" id="channelTitle">Yuklanmoqda...</div>
    <div class="sub" id="postTitle"></div>
  </div>

  <div class="card" id="formCard">
    <div class="quick-amounts" id="quickAmounts">
      <button data-val="5000">5 000</button>
      <button data-val="10000">10 000</button>
      <button data-val="20000">20 000</button>
      <button data-val="50000">50 000</button>
    </div>

    <input type="number" id="amountInput" placeholder="Yoki o'zingiz summa kiriting">

    <div class="row" style="margin-top: 12px;">
      <input type="text" id="nameInput" placeholder="Ismingizni kiriting">
      <div class="toggle" id="anonToggle"></div>
    </div>
    <div class="toggle-label" style="margin: -4px 0 12px 2px;">Anonim (ism yashirin)</div>

    <textarea id="commentInput" maxlength="250" placeholder="Izohingizni kiriting..."></textarea>
    <div class="counter"><span id="charCount">0</span>/250</div>

    <div class="methods">
      <button class="method-btn" data-method="click">Click</button>
      <button class="method-btn" data-method="payme">Payme</button>
    </div>

    <div class="terms">
      <input type="checkbox" id="termsCheck" style="margin-top:2px;">
      <label for="termsCheck"><a href="/terms.html" target="_blank">Xizmat shartlari va qoidalari</a>ga rozi bo'ldim</label>
    </div>

    <button id="payBtn" disabled>🎁 Donat qilish</button>
    <div id="msg"></div>
  </div>
</div>

<div id="tabTop" class="tab-content">
  <div class="section-title">🏆 Top donatlar</div>
  <div id="topList"><div class="empty-tab">Yuklanmoqda...</div></div>
</div>

<div id="tabTema" class="tab-content">
  <div class="section-title">🎨 Tema do'koni</div>
  <div id="temaList"><div class="empty-tab">Yuklanmoqda...</div></div>
</div>

<div id="tabHisobot" class="tab-content">
  <div class="section-title">📊 Hisobotlar</div>
  <div id="hisobotList"><div class="empty-tab">Yuklanmoqda...</div></div>
</div>

  <div class="overlay" id="statusOverlay">
    <div class="modal" id="statusModal">
      <!-- JS orqali to'ldiriladi -->
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" data-tab="tabAsosiy"><span class="nav-icon">🏠</span>Asosiy</button>
    <button class="nav-btn" data-tab="tabTop"><span class="nav-icon">🏆</span>Top donatlar</button>
    <button class="nav-btn" data-tab="tabTema"><span class="nav-icon">🎨</span>Tema</button>
    <button class="nav-btn" data-tab="tabHisobot"><span class="nav-icon">📊</span>Hisobotlar</button>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const params = new URLSearchParams(window.location.search);
const postId = params.get('post');
const channelIdParam = params.get('ch');
const donationIdParam = params.get('donation');

let channelId = channelIdParam || null;
let selectedMethod = null;
let anonymous = false;

// ============ TEMALAR ============
const THEME_PRESETS = {
  dark: {
    primary: '#8b5cf6', primaryDark: '#7c3aed', accent: '#38bdf8', bg: '#0f0c1d',
    card: '#1a1630', card2: '#211c3d', border: '#322b52',
    hero: 'radial-gradient(circle at 30% 20%, #4c1d95, #0f0c1d 70%), linear-gradient(135deg, #3b0764, #1e1b4b 50%, #0f0c1d)'
  },
  neon: {
    primary: '#ff2fd0', primaryDark: '#c0199e', accent: '#00f0ff', bg: '#0a0014',
    card: '#170a2e', card2: '#1e0f3d', border: '#5b1a8c',
    hero: 'radial-gradient(circle at 30% 20%, #ff2fd0aa, #0a0014 70%), linear-gradient(135deg, #2d0a4e, #120224 60%, #0a0014)'
  },
  glass: {
    primary: '#60a5fa', primaryDark: '#3b82f6', accent: '#93c5fd', bg: '#0d1420',
    card: 'rgba(255,255,255,0.06)', card2: 'rgba(255,255,255,0.1)', border: 'rgba(255,255,255,0.15)',
    hero: 'linear-gradient(135deg, rgba(96,165,250,0.25), rgba(13,20,32,0.9))'
  },
  gold: {
    primary: '#d4af37', primaryDark: '#b8952e', accent: '#f5d76e', bg: '#0c0a06',
    card: '#1c1710', card2: '#241d13', border: '#4a3d1f',
    hero: 'radial-gradient(circle at 30% 20%, #4a3d1f, #0c0a06 70%), linear-gradient(135deg, #2b2412, #0c0a06)'
  },
  anime: {
    primary: '#f472b6', primaryDark: '#ec4899', accent: '#a78bfa', bg: '#1a0f24',
    card: '#28162f', card2: '#331d3d', border: '#5c3568',
    hero: 'radial-gradient(circle at 30% 20%, #f472b6aa, #1a0f24 70%), linear-gradient(135deg, #4a1f5c, #1a0f24)'
  }
};

function applyTheme(key) {
  const t = THEME_PRESETS[key] || THEME_PRESETS.dark;
  const root = document.documentElement.style;
  root.setProperty('--primary', t.primary);
  root.setProperty('--primary-dark', t.primaryDark);
  root.setProperty('--accent', t.accent);
  root.setProperty('--bg', t.bg);
  root.setProperty('--card', t.card);
  root.setProperty('--card-2', t.card2);
  root.setProperty('--border', t.border);
  document.body.style.background = t.bg;
  document.querySelector('.hero').style.background = t.hero;
}

function setChannelIcon(channelId, title) {
  const icon = document.getElementById('channelIcon');
  icon.textContent = (title || 'D')[0].toUpperCase();
  if (!channelId) return;
  const img = new Image();
  img.onload = () => { icon.innerHTML = ''; icon.appendChild(img); };
  img.onerror = () => {};
  img.src = '/api/channel-photo/' + channelId;
}

async function loadContext() {
  try {
    if (postId) {
      const res = await fetch('/api/post/' + postId);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      channelId = data.channelId;
      document.getElementById('channelTitle').textContent = data.channelTitle || 'Kanal';
      document.getElementById('postTitle').textContent = data.title || '';
      setChannelIcon(channelId, data.channelTitle);
      applyTheme(data.theme);
    } else if (channelId) {
      const res = await fetch('/api/channel/' + channelId);
      const data = await res.json();
      document.getElementById('channelTitle').textContent = data.title || 'Kanal';
      setChannelIcon(channelId, data.title);
      applyTheme(data.theme);
    } else {
      document.getElementById('channelTitle').textContent = 'Kanal aniqlanmadi';
    }
  } catch (e) {
    document.getElementById('channelTitle').textContent = 'Xatolik: kanal topilmadi';
  }
}

// ============ AGAR TO'LOVDAN QAYTIB KELINGAN BO'LSA ============
function showModal(html) {
  document.getElementById('statusModal').innerHTML = html;
  document.getElementById('statusOverlay').classList.add('show');
}

async function checkDonationStatus() {
  document.getElementById('formCard').style.display = 'none';
  const nav = document.querySelector('.bottom-nav');
  if (nav) nav.style.display = 'none';
  showModal(`
    <div class="spinner"></div>
    <h2>Tekshirilmoqda...</h2>
    <p>To'lovingiz tasdiqlanishini kutyapmiz, biroz kuting.</p>
  `);

  let attempts = 0;
  const maxAttempts = 15;

  const interval = setInterval(async () => {
    attempts++;
    try {
      const res = await fetch('/api/donation-status/' + donationIdParam);
      const data = await res.json();

      if (data.status === 'paid') {
        clearInterval(interval);
        showModal(`
          <div class="emoji">🎉</div>
          <h2>Rahmat!</h2>
          <p>Donatingiz uchun rahmat! To'lovingiz muvaffaqiyatli qabul qilindi.</p>
          <button class="btn-success" onclick="window.Telegram.WebApp.close()">Yopish</button>
        `);
        return;
      }
    } catch (e) {}

    if (attempts >= maxAttempts) {
      clearInterval(interval);
      showModal(`
        <div class="emoji">😕</div>
        <h2>To'lov aniqlanmadi</h2>
        <p>To'lovni amalga oshirib bo'lmadi. Qayta urinib ko'ring yoki internet aloqangizni tekshiring.</p>
        <button class="btn-danger" onclick="location.href = location.pathname">Qayta urinish</button>
      `);
    }
  }, 2000);
}

if (donationIdParam) {
  checkDonationStatus();
} else {
  loadContext();
}

document.querySelectorAll('#quickAmounts button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#quickAmounts button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('amountInput').value = btn.dataset.val;
    updateButton();
  });
});

document.getElementById('amountInput').addEventListener('input', () => {
  document.querySelectorAll('#quickAmounts button').forEach(b => b.classList.remove('active'));
  updateButton();
});

document.getElementById('anonToggle').addEventListener('click', (e) => {
  anonymous = !anonymous;
  e.target.classList.toggle('on', anonymous);
  document.getElementById('nameInput').disabled = anonymous;
  document.getElementById('nameInput').style.opacity = anonymous ? 0.4 : 1;
});

document.getElementById('commentInput').addEventListener('input', (e) => {
  document.getElementById('charCount').textContent = e.target.value.length;
});

document.querySelectorAll('.method-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedMethod = btn.dataset.method;
    updateButton();
  });
});

document.getElementById('termsCheck').addEventListener('change', updateButton);

function updateButton() {
  const amount = Number(document.getElementById('amountInput').value);
  const terms = document.getElementById('termsCheck').checked;
  const msg = document.getElementById('msg');
  msg.textContent = '';

  const valid = amount >= 5000 && selectedMethod && terms && channelId;
  document.getElementById('payBtn').disabled = !valid;

  if (amount > 0 && amount < 5000) msg.textContent = "Minimal summa 5 000 so'm";
}

document.getElementById('payBtn').addEventListener('click', async () => {
  const msg = document.getElementById('msg');
  msg.textContent = '';
  const user = tg.initDataUnsafe?.user;

  try {
    const res = await fetch('/api/donate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        channelId,
        postId,
        name: document.getElementById('nameInput').value,
        anonymous,
        comment: document.getElementById('commentInput').value,
        amount: Number(document.getElementById('amountInput').value),
        method: selectedMethod,
        telegramUserId: user?.id
      })
    });
    const data = await res.json();

    if (data.error) { msg.textContent = data.error; return; }

    tg.openLink(data.payUrl);
  } catch (err) {
    msg.textContent = "Xatolik yuz berdi, qayta urinib ko'ring.";
  }
});

// ============ PASTKI NAVIGATSIYA ============
const loadedTabs = {};

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById(tab).classList.add('active');

    if (!loadedTabs[tab]) {
      loadedTabs[tab] = true;
      if (tab === 'tabTop') loadTopDonors();
      if (tab === 'tabTema') loadThemeShop();
      if (tab === 'tabHisobot') loadHisobot();
    }
  });
});

async function loadTopDonors() {
  const el = document.getElementById('topList');
  try {
    const list = await fetch('/api/leaderboard').then(r => r.json());
    if (!list.length) { el.innerHTML = '<div class="empty-tab">Hozircha maʼlumot yoʻq</div>'; return; }
    el.innerHTML = list.map(c => `
      <div class="lb-row">
        <div class="lb-rank ${c.rank <= 3 ? 'gold' : ''}">#${c.rank}</div>
        <div class="lb-avatar" data-ch="${c.channelId}">${(c.title || 'K')[0].toUpperCase()}</div>
        <div class="lb-title">${escapeHtml(c.title)}</div>
        <div class="lb-total">${c.total.toLocaleString()} so'm</div>
      </div>
    `).join('');
    document.querySelectorAll('.lb-avatar').forEach(av => {
      const img = new Image();
      img.onload = () => { av.innerHTML = ''; av.appendChild(img); img.style.width = '100%'; img.style.height = '100%'; img.style.objectFit = 'cover'; };
      img.src = '/api/channel-photo/' + av.dataset.ch;
    });
  } catch (e) {
    el.innerHTML = '<div class="empty-tab">Xatolik yuz berdi</div>';
  }
}

async function loadThemeShop() {
  const el = document.getElementById('temaList');
  const user = tg.initDataUnsafe?.user;
  if (!user) { el.innerHTML = '<div class="empty-tab">Telegram orqali oching</div>'; return; }

  try {
    const shop = await fetch('/api/theme-shop/' + user.id).then(r => r.json());
    if (!shop.hasChannel) {
      el.innerHTML = '<div class="empty-tab">Avval botda "Kanalim" boʻlimidan kanalingizni ulang.</div>';
      return;
    }

    el.innerHTML = `
      <div style="text-align:center; margin-bottom: 14px; opacity: 0.7; font-size: 13px;">
        Balansingiz: <b style="color: var(--success);">${shop.balance.toLocaleString()} so'm</b>
      </div>
    ` + shop.themes.map(t => `
      <div class="theme-card">
        <div class="theme-preview" style="background: ${THEME_PRESETS[t.key]?.hero || '#333'};"></div>
        <div class="theme-info">
          <div class="theme-name">${t.name}</div>
          <div class="theme-price">${t.price > 0 ? t.price.toLocaleString() + " so'm" : 'Bepul'}</div>
        </div>
        <button class="theme-btn ${t.key === shop.currentTheme ? 'active' : 'buy'}" data-key="${t.key}" data-price="${t.price}">
          ${t.key === shop.currentTheme ? '✅ Faol' : "Tanlash"}
        </button>
      </div>
    `).join('');

    el.querySelectorAll('.theme-btn.buy').forEach(btn => {
      btn.addEventListener('click', async () => {
        const key = btn.dataset.key;
        const price = Number(btn.dataset.price);
        if (price > 0 && !confirm(`${price.toLocaleString()} so'm evaziga shu temani sotib olasizmi?`)) return;

        btn.disabled = true;
        btn.textContent = '...';
        try {
          const res = await fetch('/api/theme-buy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ownerId: user.id, theme: key })
          });
          const data = await res.json();
          if (data.error) { alert(data.error); btn.disabled = false; btn.textContent = 'Tanlash'; return; }
          loadedTabs['tabTema'] = false;
          loadThemeShop();
        } catch (e) {
          alert("Xatolik yuz berdi");
          btn.disabled = false;
        }
      });
    });
  } catch (e) {
    el.innerHTML = '<div class="empty-tab">Xatolik yuz berdi</div>';
  }
}

async function loadHisobot() {
  const el = document.getElementById('hisobotList');
  const user = tg.initDataUnsafe?.user;
  if (!user) { el.innerHTML = '<div class="empty-tab">Telegram orqali oching</div>'; return; }
  try {
    const payments = await fetch('/api/payments/' + user.id).then(r => r.json());
    if (!payments.length) { el.innerHTML = '<div class="empty-tab">Hozircha donat yoʻq</div>'; return; }
    el.innerHTML = payments.map(p => `
      <div class="stat-row">
        <div>${escapeHtml(p.name)}${p.comment ? ' — ' + escapeHtml(p.comment) : ''}</div>
        <div class="val" style="color: var(--success);">${p.amount.toLocaleString()} so'm</div>
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = '<div class="empty-tab">Xatolik yuz berdi</div>';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
</script>
